name: Real Estate News Bot
on:
  schedule:
    - cron: '30 23 * * *' # 한국시간 오전 8:30
    - cron: '30 8 * * *'  # 한국시간 오후 5:30
  workflow_dispatch: 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v3에서 v4로 업데이트
      - name: 파이썬 설치
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.10'
      - name: 필요 도구 설치
        run: pip install python-telegram-bot requests
      - name: 비서 실행
        env:
          # Node.js 24 환경을 강제로 사용하여 경고를 제거합니다.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
        run: python bot.py
