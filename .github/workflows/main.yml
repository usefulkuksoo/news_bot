name: Real Estate News Bot

on:
  schedule:
    # 한국시간 09:00, 13:00, 19:00 (UTC 00:00, 04:00, 10:00)
    - cron: "0 0,4,10 * * *"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # ✅ 1. 장부 저장을 위한 권한 추가 (필수)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ✅ 2. requirements.txt 대신 직접 설치로 변경 (실수 방지)
          pip install python-telegram-bot requests beautifulsoup4

      - name: Run news-briefing script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # ✅ 3. 파일 이름을 bot.py로 수정
        run: python bot.py

      - name: Commit updated seen_news.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 장부 파일이 없으면 생성
          touch seen_news.txt
          git add seen_news.txt
          # 변화가 없으면 커밋 안 함 (에러 방지)
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "🤖 Update seen_news.txt (auto-bot)"
            git push
          )
