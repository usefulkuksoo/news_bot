name: Real Estate News Bot

on:
  schedule:
    - cron: "0 0,4,10 * * *"  # 한국시간 09:00, 13:00, 19:00
  workflow_dispatch:          # 직접 실행 버튼 추가

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-telegram-bot
      - name: Run Script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python main.py  # 여기서 'main.py'를 실행하라고 시킵니다.
      - name: Save History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_news.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update history" && git push)
